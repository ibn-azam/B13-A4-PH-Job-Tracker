<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>
    <link rel="shortcut icon" href="jobs.png" type="image/x-icon">
    <!-- daisy link -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fontawesome  -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <!-- Font -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<style>
    *{
        font-family: "Geist", sans-serif;
    }
</style>
</head>
<body class="bg-[#F8FAFC]">
    <header class="w-[1140px] mx-auto mt-[60px]">
        <section>
            <h1 class="text-[30px] font-medium text-[#002C5C] mb-[20px]">Job Application Tracker</h1>
            <div class="flex gap-[16px]">
                <div class="total w-[360px] bg-base-100 p-[20px]">
                <h4 class="text-[14px] text-[#323B49] mb-[8px] ">Total</h4>
                <h2 class="text-[24px] text-[#002C5C]">8</h2>
            </div>
                <div class="total w-[360px] bg-base-100 p-[20px]">
                <h4 class="text-[14px] text-[#323B49] mb-[8px] ">Interview</h4>
                <h2 class="text-[24px] text-[#10B981]">0</h2>
            </div>
                <div class="total w-[360px] bg-base-100 p-[20px]">
                <h4 class="text-[14px] text-[#323B49] mb-[8px] ">Rejected</h4>
                <h2 class="text-[24px] text-[#EF4444]">0</h2>
            </div>
            </div>
        </section>
    </header>
</body>
</html>
